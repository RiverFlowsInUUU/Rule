port: 7890
socks-port: 7891
allow-lan: true
bind-address: "*"
ipv6: false
mode: Rule
log-level: info
external-controller: 127.0.0.1:9090

geodata-mode: true

dns:
  enable: true
  ipv6: false
  listen: 0.0.0.0:53
  fake-ip-range: 198.18.0.1/16
  use-hosts: true

  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "*.arpa"
    - time.*.com
    - ntp.*.com
    - +.market.xiaomi.com
    - localhost.ptlogin2.qq.com
    - "*.msftncsi.com"
    - www.msftconnecttest.com

  default-nameserver:
    - 119.29.29.29
    - 223.5.5.5

  nameserver:
    - 119.29.29.29
    - 223.5.5.5

  nameserver-policy:
    geosite:cn:
      - 119.29.29.29
      - 223.5.5.5
    geosite:geolocation-!cn:
      - tls://1.0.0.1:853
      - tls://dns.google:853

  proxy-server-nameserver:
    - 119.29.29.29
    - 223.5.5.5

  fallback:
    - 8.8.8.8
    - 1.1.1.1
    - tls://1.0.0.1:853
    - tls://dns.google:853

  fallback-filter:
    geoip: true
    geoip-code: CN
    geosite:
      - gfw
    ipcidr:
      - 240.0.0.0/4

