[custom]
===============

enable_rule_generator=true
overwrite_original_rules=true

; ==========================================================
; 节点清洗：剔除机场展示/说明/防失联/流量提示节点
; ==========================================================
exclude=流量|套餐|到期|剩余|重置|官网|网站|最新网址|防失联|失联|官网地址|公告|通知|TG|Telegram|电报|群|频道|说明|使用说明|QQ群|客服|工单|订阅|Expire|Traffic|Reset|Remaining|Expire|Official|Website


; ==========================================================
; 1) 规则（自上而下优先级）
; ==========================================================


ruleset=AD,https://raw.githubusercontent.com/TG-Twilight/AWAvenue-Ads-Rule/main/Filters/AWAvenue-Ads-Rule-Clash-classical.yaml
ruleset=AD,[]GEOSITE,apple-update
; --- 私网直连 ---

ruleset=DIRECT,[]GEOSITE,private
ruleset=DIRECT,[]GEOIP,private,no-resolve

; --- Aethersailor 直连补丁 ---
ruleset=DIRECT,clash-domain:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Direct_Domain.yaml,28800
ruleset=DIRECT,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Direct_Classical_IP.yaml,28800

; --- Aethersailor 代理补丁（仅兜底用，不越权）---
ruleset=Proxy,clash-domain:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Proxy_Domain.yaml,28800
ruleset=Proxy,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Proxy_Classical_IP.yaml,28800

; --- 国内直连 ---
ruleset=DIRECT,[]GEOSITE,cn
ruleset=DIRECT,[]GEOIP,cn,no-resolve

; --- 国内可用 / 下载 / BT ---
ruleset=DIRECT,[]GEOSITE,google-cn
ruleset=DIRECT,[]GEOSITE,category-games@cn
ruleset=DIRECT,[]GEOSITE,category-game-platforms-download
ruleset=DIRECT,[]GEOSITE,category-public-tracker
;------------请在下方区域内添加应用---------------
; --- 核心应用 ---


ruleset=ChatGPT,[]GEOSITE,openai
ruleset=Gemini,[]GEOSITE,google-gemini
ruleset=Claude,[]GEOSITE,category-ai-!cn
ruleset=YouTube,[]GEOSITE,youtube
ruleset=X,[]GEOSITE,twitter
ruleset=Telegram,[]GEOSITE,telegram
ruleset=Telegram,[]GEOIP,telegram,no-resolve
ruleset=Google,[]GEOSITE,google
ruleset=Google,[]GEOIP,google,no-resolve
ruleset=GitHub,[]GEOSITE,github
#ruleset=GitHub,[]GEOIP,github,no-resolve
ruleset=SpeedTest,[]GEOSITE,category-speedtest
ruleset=Proxy,[]GEOSITE,category-communication
ruleset=Proxy,[]GEOSITE,category-social-media-!cn
ruleset=Proxy,[]GEOSITE,cloudflare
ruleset=Proxy,[]GEOIP,cloudflare,no-resolve
ruleset=Proxy,[]GEOSITE,gfw
ruleset=Proxy,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Port_Direct.yaml,28800
ruleset=Microsoft,[]GEOSITE,microsoft
ruleset=Microsoft,[]GEOIP,microsoft,no-resolve
ruleset=Apple,[]GEOSITE,apple
ruleset=Final,[]FINAL
#ruleset=Netflix,[]GEOSITE,netflix
#ruleset=Netflix,[]GEOIP,netflix,no-resolve
#ruleset=TikTok,[]GEOSITE,tiktok
#ruleset=TikTok,[]GEOIP,tiktok,no-resolve
#ruleset=Instagram,[]GEOSITE,instagram



#ruleset=Steam,[]GEOSITE,steam






; ==========================================================
; 2) 应用分流策略组（UI 主入口，不越权）
;    说明：每个应用都加入「Other Regions」可选
; ==========================================================
;------------请在下方区域内添加应用---------------
custom_proxy_group=Proxy`select`[]Auto`[]HK`[]TW`[]JP`[]SG`[]US`[]Other Regions
custom_proxy_group=Select`select`.*
custom_proxy_group=Auto`url-test`.*`https://www.gstatic.com/generate_204`300,,50
custom_proxy_group=ChatGPT`select`[]TW`[]JP`[]SG`[]US`[]Proxy`.*
custom_proxy_group=Gemini`select`[]Select`[]Proxy`[]HK`[]TW`[]JP`[]SG`[]US`.*
custom_proxy_group=Claude`select`[]Select`[]TW`[]Proxy`[]JP`[]SG`[]US`.*
custom_proxy_group=YouTube`select`[]Proxy`[]US`[]HK`[]TW`[]JP`[]SG
custom_proxy_group=X`select`[]Proxy`[]HK`[]TW`[]JP`[]SG`[]US
custom_proxy_group=Telegram`select`[]Proxy`[]Select`[]HK`[]TW`[]JP`[]SG`[]US
custom_proxy_group=Google`select`[]Proxy`[]Select`[]HK`[]TW`[]JP`[]SG`[]US
custom_proxy_group=GitHub`select`[]Proxy`[]Select`[]HK`[]TW`[]JP`[]SG`[]US
custom_proxy_group=SpeedTest`select`[]Proxy`[]Select`[]DIRECT
custom_proxy_group=Microsoft`select`[]DIRECT`[]HK`[]TW`[]JP`[]SG`[]US
custom_proxy_group=Apple`select`[]DIRECT`[]Proxy
